<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISOV Market - Sin conexión</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Inter', sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .icon svg {
            width: 48px;
            height: 48px;
            color: white;
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }
        p {
            color: #64748b;
            line-height: 1.5;
            margin-bottom: 1rem;
        }
        .btn {
            display: inline-block;
            background: #4f46e5;
            color: white;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            text-decoration: none;
            margin-top: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #4338ca;
            transform: translateY(-2px);
        }
        .cached-info {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
            font-size: 0.75rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636L5.636 18.364M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        <h1>Sin conexión</h1>
        <p>Parece que no tienes acceso a Internet en este momento.</p>
        <p><strong>No te preocupes</strong><br>Los productos que ya has visto están disponibles en tu caché.</p>
        <button class="btn" onclick="location.reload()">🔄 Reintentar</button>
        <div class="cached-info">
            <span>📱 SISOV Market - Versión instalada</span>
        </div>
    </div>
</body>
</html>
